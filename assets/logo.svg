<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>
  <!-- Shield/tablet icon -->
  <g transform="translate(50, 50)">
    <rect x="-22" y="-30" width="44" height="60" rx="6" stroke="url(#g1)" stroke-width="2" fill="none"/>
    <!-- Cuneiform-inspired marks -->
    <line x1="-10" y1="-18" x2="-10" y2="-6" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="-18" x2="-4" y2="-14" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-16" x2="0" y2="-4" stroke="#7b2ff7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-16" x2="6" y2="-12" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-14" x2="10" y2="-2" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Test checkmark -->
    <polyline points="-6,10 -1,16 10,4" stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="90" y="42" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="28" font-weight="700" fill="#e0e0e0" letter-spacing="1">
    gilgamesh
  </text>
  <text x="90" y="64" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#888" letter-spacing="1.5">
    TDD-DRIVEN LOCAL AI CODING AGENT
  </text>
</svg>
